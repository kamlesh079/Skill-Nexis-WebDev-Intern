<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button</title>
  </head>
  <body>
    <!-- Button linking to Google -->
    <a href="http://www.google.com">
      <button
        style="
          font-size: 25px;
          background-color: gray;
          color: blue;
          border-radius: 25px;
        "
      >
        Go to Google
      </button>
    </a>

    <br />

    <!-- Button linking to 2nd-page.html -->
    <a href="2nd-page.html">
      <button
        style="
          font-size: 25px;
          background-color: gray;
          color: blue;
          border-radius: 25px;
        "
      >
        Click Me
      </button>
    </a>

      <br />

    <!-- Button performing an action -->
    <button
      style="
        font-size: 25px;
        background-color: gray;
        color: blue;
        border-radius: 25px;
      "
      onclick="alert('Button clicked!')"
    >
      Click Me
    </button>
  </body>
</html>
