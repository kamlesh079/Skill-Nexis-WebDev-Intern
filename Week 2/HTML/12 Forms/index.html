<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
  </head>
  <body>
    <!-- action attribute specifies where to send the form data when the form is submitted -->
    <!-- method attribute specifies how to send the form data eg POST, GET. Post is used to send sensitive data and GET is used to send non-sensitive data -->
    <!-- enctype attribute specifies how the form data should be encoded when submitted -->

    <form action = "index.php" method="POST" enctype="multipart/form-data">
      <legend>Registration Form</legend>
      <label for="username">User Name:</label>
      <input
        type="text"
        id="username"
        minlength="6"
        maxlength="15"
        placeholder="goku20Aug"
      />
      <br />

      <label for="password">Password:</label>
      <input type="password" id="password" />
      <br />

      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="xyz@p.com" />
      <br />

      <label for="phone">Phone:</label>
      <input
        type="tel"
        id="phone"
        placeholder="xxx-xxx-xxxx"
        required
        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
      />
      <br />

      <label for="age">Age:</label>
      <input type="number" id="age" required min="18" max="100" />
      <br />

      <label for="dob">Date of Birth:</label>
      <input type="date" id="dob" required />
      <br />

      <!-- name attribute groups radio buttons so that only one can be selected -->
      <label for="Mr.">Mr.</label>
      <input type="radio" id="Mr." name="title" value="Mr." />
      <label for="Mrs.">Mrs.</label>
      <input type="radio" id="Mrs." name="title" value="Mrs." />
      <label for="Ms.">Ms.</label>
      <input type="radio" id="Ms." name="title" value="Ms." />
      <br />

      <label for="color">Favorite Color:</label>
      <input type="color" id="color" />
      <br />

      <label for="payment">Payment Method:</label>
      <select id="payment" name="payment">
        <option value="cash">Cash</option>
        <option value="credit">Credit Card</option>
        <option value="debit">Debit Card</option>
        <option value="upi">UPI</option>
      </select>
      <br />

      <label for="subscribe">Subscribe to Newsletter:</label>
      <input type="checkbox" id="subscribe" name="subscribe" value="yes" />
      <br />

      <label for="feedback">Feedback:</label>
      <textarea id="feedback" name="feedback" rows="4" cols="50"></textarea>
      <br />

      <label for="file">Upload File:</label>
      <input type="file" id="file" name="file" accept="image/png, image/jpeg" />
      <br />

      <input type="submit" />
      <br />

      <input type="reset" />
    </form>
  </body>
</html>
