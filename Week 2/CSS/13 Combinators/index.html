<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinators</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 
        cobinators = explain the relationship between listed selectors
        ' ' = descendent combinator (space) -> all the elements that are descendants of a specified element
        > = child combinator
        ~ = general sibling combinator
        + = adjacent sibling combinator

    -->

    <div id="container">
        <p>This is #1</p>
        <p>This is #2</p>
        <div>
            <p>This is #3</p>
        </div>
    </div>

    <p> This is #4 </p>

    <p>This is #5</p>
    
</body>
</html>
