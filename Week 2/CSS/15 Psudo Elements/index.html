<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pseudo Elements</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 
        Pseudo Elements = keyword added after a selector
        that's used to style a specific part of the selected element(s)

        selector::pseudo-element {
            property: value;
        }
    -->

    <h1>Hello</h1>

    <p>
      Lorem ipsum, dolor sit amet consectetur adipisicing elit. Quia excepturi
      temporibus neque asperiores ipsa amet blanditiis consectetur et sed
      reprehenderit nam iure, quas aspernatur animi ipsum voluptatum? Quos, vero
      dicta.
    </p>

    <ul id="fruits">
        <li id = "apple">Apple</li>
        <li id = "orange">Oranage</li>
        <li id = "banana">Banana</li>
    </ul>
  </body>
</html>
