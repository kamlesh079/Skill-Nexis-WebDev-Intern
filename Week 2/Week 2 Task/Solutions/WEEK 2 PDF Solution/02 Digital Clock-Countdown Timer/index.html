<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock & Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="clock-container">
        <!-- Live Digital Clock Section -->
        <div class="clock-section">
            <h2>Current Local Time</h2>
            <div id="digital-clock" class="time-display">00:00:00 AM</div>
        </div>

        <div class="divider"></div>

        <!-- Countdown Timer Section -->
        <div class="countdown-section">
            <h2>Countdown to New Year</h2>
            <div class="countdown-grid">
                <div class="time-box"><span id="days">00</span><p>Days</p></div>
                <div class="time-box"><span id="hours">00</span><p>Hours</p></div>
                <div class="time-box"><span id="minutes">00</span><p>Mins</p></div>
                <div class="time-box"><span id="seconds">00</span><p>Secs</p></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
